<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Garage door tune-up checklist with rollers, track, and oil can">
  <rect width="1200" height="900" fill="#F7F5F1"/>
  <rect x="0" y="720" width="1200" height="180" fill="#E2E3E5"/>
  <line x1="0" y1="720" x2="1200" y2="720" stroke="#0B0B0C" stroke-width="6"/>
  <!-- curved track + rollers -->
  <g stroke="#5B6066" stroke-width="10" fill="none" stroke-linecap="round">
    <path d="M150 720 V260 a120 120 0 0 1 120 -120 h330"/>
  </g>
  <g fill="#8A8F95" stroke="#0B0B0C" stroke-width="6">
    <circle cx="150" cy="620" r="22"/>
    <circle cx="150" cy="480" r="22"/>
    <circle cx="150" cy="340" r="22"/>
    <circle cx="360" cy="140" r="22"/>
    <circle cx="500" cy="140" r="22"/>
  </g>
  <!-- oil can -->
  <g stroke="#0B0B0C" stroke-width="6" stroke-linejoin="round">
    <path d="M320 640 h130 v80 h-130 z" fill="#5B6066"/>
    <path d="M355 640 v-28 h60 v28" fill="#8A8F95"/>
    <path d="M450 660 l90 -50 12 20 -86 56 z" fill="#8A8F95"/>
    <path d="M380 596 q10 -26 0 -40" fill="none" stroke="#C2C5C8"/>
  </g>
  <!-- clipboard -->
  <g stroke="#0B0B0C" stroke-width="7" stroke-linejoin="round">
    <rect x="620" y="130" width="430" height="560" rx="10" fill="#5B6066"/>
    <rect x="650" y="180" width="370" height="480" fill="#FFFFFF"/>
    <rect x="770" y="106" width="130" height="52" rx="8" fill="#8A8F95"/>
  </g>
  <!-- checklist rows: green status pips -->
  <g>
    <g stroke="#0B0B0C" stroke-width="5">
      <circle cx="700" cy="250" r="20" fill="#3FA756"/>
      <circle cx="700" cy="350" r="20" fill="#3FA756"/>
      <circle cx="700" cy="450" r="20" fill="#3FA756"/>
      <circle cx="700" cy="550" r="20" fill="#FFFFFF"/>
    </g>
    <g stroke="#FFFFFF" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M690 250 l7 8 14 -16"/>
      <path d="M690 350 l7 8 14 -16"/>
      <path d="M690 450 l7 8 14 -16"/>
    </g>
    <g fill="#C2C5C8">
      <rect x="745" y="238" width="240" height="14" rx="7"/>
      <rect x="745" y="266" width="170" height="14" rx="7"/>
      <rect x="745" y="338" width="240" height="14" rx="7"/>
      <rect x="745" y="366" width="150" height="14" rx="7"/>
      <rect x="745" y="438" width="240" height="14" rx="7"/>
      <rect x="745" y="466" width="190" height="14" rx="7"/>
      <rect x="745" y="538" width="240" height="14" rx="7"/>
      <rect x="745" y="566" width="120" height="14" rx="7"/>
    </g>
  </g>
  <!-- pencil -->
  <g transform="rotate(38 1010 610)" stroke="#0B0B0C" stroke-width="6" stroke-linejoin="round">
    <rect x="960" y="590" width="150" height="34" fill="#F2B700"/>
    <path d="M1110 590 l34 17 -34 17 z" fill="#F7F5F1"/>
    <rect x="944" y="590" width="16" height="34" fill="#D11F2C"/>
  </g>
  <!-- balance gauge -->
  <g stroke="#0B0B0C" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M300 850 a90 90 0 0 1 180 0" fill="#FFFFFF"/>
    <line x1="300" y1="850" x2="480" y2="850"/>
    <path d="M390 850 L448 788" stroke="#D11F2C" stroke-width="8"/>
    <circle cx="390" cy="850" r="10" fill="#0B0B0C"/>
  </g>
</svg>
