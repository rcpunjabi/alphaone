<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="New garage door mid-installation with ladder and level">
  <rect width="1200" height="900" fill="#F7F5F1"/>
  <rect x="0" y="0" width="1200" height="660" fill="#F0F0EF"/>
  <rect x="0" y="660" width="1200" height="240" fill="#E2E3E5"/>
  <line x1="0" y1="660" x2="1200" y2="660" stroke="#0B0B0C" stroke-width="6"/>
  <!-- opening + frame -->
  <g stroke="#0B0B0C" stroke-width="7" stroke-linejoin="round" stroke-linecap="round">
    <rect x="150" y="120" width="620" height="540" fill="#FFFFFF"/>
    <!-- three installed panels -->
    <g fill="#FFFFFF">
      <rect x="150" y="120" width="620" height="135"/>
      <rect x="150" y="255" width="620" height="135"/>
      <rect x="150" y="390" width="620" height="135"/>
    </g>
    <!-- embossed insets -->
    <g fill="none" stroke="#C2C5C8" stroke-width="5">
      <rect x="185" y="152" width="250" height="70" rx="2"/><rect x="485" y="152" width="250" height="70" rx="2"/>
      <rect x="185" y="287" width="250" height="70" rx="2"/><rect x="485" y="287" width="250" height="70" rx="2"/>
      <rect x="185" y="422" width="250" height="70" rx="2"/><rect x="485" y="422" width="250" height="70" rx="2"/>
    </g>
    <!-- open gap at bottom -->
    <rect x="150" y="525" width="620" height="135" fill="#16181B"/>
    <!-- lift cables -->
    <line x1="176" y1="525" x2="176" y2="640" stroke="#5B6066" stroke-width="4"/>
    <line x1="744" y1="525" x2="744" y2="640" stroke="#5B6066" stroke-width="4"/>
  </g>
  <!-- fourth panel leaning at right -->
  <g transform="rotate(-8 990 700)">
    <rect x="850" y="560" width="290" height="130" fill="#FFFFFF" stroke="#0B0B0C" stroke-width="7"/>
    <rect x="880" y="592" width="100" height="64" fill="none" stroke="#C2C5C8" stroke-width="5"/>
    <rect x="1010" y="592" width="100" height="64" fill="none" stroke="#C2C5C8" stroke-width="5"/>
  </g>
  <!-- step ladder -->
  <g stroke="#0B0B0C" stroke-width="8" stroke-linecap="round" fill="none">
    <path d="M846 300 L790 700"/>
    <path d="M900 300 L960 700"/>
    <line x1="828" y1="430" x2="922" y2="430"/>
    <line x1="816" y1="520" x2="936" y2="520"/>
    <line x1="804" y1="610" x2="948" y2="610"/>
    <rect x="836" y="270" width="76" height="34" fill="#5B6066"/>
  </g>
  <!-- yellow level on floor (single yellow accent) -->
  <g stroke="#0B0B0C" stroke-width="6" stroke-linejoin="round">
    <rect x="260" y="740" width="330" height="46" rx="4" fill="#F2B700"/>
    <circle cx="425" cy="763" r="13" fill="#FFF6D6"/>
    <line x1="418" y1="756" x2="432" y2="770" stroke-width="4"/>
  </g>
  <!-- red toolbox -->
  <g stroke="#0B0B0C" stroke-width="6" stroke-linejoin="round">
    <rect x="680" y="726" width="170" height="80" rx="4" fill="#D11F2C"/>
    <path d="M726 726 v-20 a14 14 0 0 1 14 -14 h50 a14 14 0 0 1 14 14 v20" fill="none"/>
    <line x1="680" y1="762" x2="850" y2="762"/>
  </g>
</svg>
