<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Alpha One van on the road, headed to a service call">
  <rect width="1200" height="900" fill="#16181B"/>
  <g fill="#2C3035">
    <rect x="180" y="110" width="4" height="4"/><rect x="420" y="70" width="4" height="4"/><rect x="700" y="130" width="4" height="4"/><rect x="950" y="90" width="4" height="4"/><rect x="1080" y="190" width="4" height="4"/><rect x="90" y="230" width="4" height="4"/>
  </g>
  <!-- skyline silhouettes -->
  <g fill="#1F2227">
    <path d="M40 560 l70 -46 70 46 v60 h-140 z"/>
    <rect x="220" y="540" width="120" height="80"/>
    <path d="M900 560 l80 -50 80 50 v60 h-160 z"/>
    <rect x="1105" y="530" width="95" height="90"/>
  </g>
  <rect x="0" y="620" width="1200" height="280" fill="#101214"/>
  <line x1="0" y1="620" x2="1200" y2="620" stroke="#2C3035" stroke-width="4"/>
  <!-- road dashes -->
  <g stroke="#5B6066" stroke-width="8" stroke-linecap="round">
    <line x1="60" y1="840" x2="150" y2="840"/><line x1="240" y1="840" x2="330" y2="840"/><line x1="420" y1="840" x2="510" y2="840"/><line x1="600" y1="840" x2="690" y2="840"/><line x1="780" y1="840" x2="870" y2="840"/><line x1="960" y1="840" x2="1050" y2="840"/>
  </g>
  <!-- clock: 24/7 always-on cue -->
  <g stroke="#C2C5C8" stroke-width="7" stroke-linecap="round" fill="none">
    <circle cx="1010" cy="300" r="56"/>
    <path d="M1010 268 v34 l24 16"/>
  </g>
  <!-- van rolling -->
  <g stroke="#C2C5C8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M330 420 h430 a18 18 0 0 1 18 18 v212 h-510 v-172 a58 58 0 0 1 58 -58 z" fill="#1F2227"/>
    <path d="M348 444 h104 v88 h-152 a58 58 0 0 1 48 -88 z" fill="#16181B"/>
    <line x1="268" y1="548" x2="778" y2="548" stroke="#D11F2C" stroke-width="24"/>
    <line x1="330" y1="382" x2="760" y2="382"/>
    <circle cx="400" cy="656" r="52" fill="#0B0B0C"/>
    <circle cx="400" cy="656" r="20" fill="#5B6066"/>
    <circle cx="680" cy="656" r="52" fill="#0B0B0C"/>
    <circle cx="680" cy="656" r="20" fill="#5B6066"/>
  </g>
  <!-- ladder on roof -->
  <g stroke="#8A8F95" stroke-width="7" stroke-linecap="round">
    <line x1="360" y1="404" x2="720" y2="404"/>
    <line x1="420" y1="392" x2="420" y2="416"/><line x1="510" y1="392" x2="510" y2="416"/><line x1="600" y1="392" x2="600" y2="416"/><line x1="690" y1="392" x2="690" y2="416"/>
  </g>
  <!-- headlight beam -->
  <path d="M252 470 l-160 44 v56 l160 30 z" fill="#FFF6D6" opacity=".8"/>
  <!-- speed lines -->
  <g stroke="#5B6066" stroke-width="8" stroke-linecap="round">
    <line x1="820" y1="440" x2="920" y2="440"/>
    <line x1="850" y1="500" x2="960" y2="500"/>
    <line x1="820" y1="560" x2="905" y2="560"/>
  </g>
</svg>
